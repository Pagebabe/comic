name: Comic Factory CI
on:
  push:
    branches: [main, 'rebuild/**']
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deterministic media dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng
          python -m pip install --disable-pip-version-check pillow==11.3.0
      - name: Verify application, canon and recovery contracts
        shell: bash
        run: |
          set -o pipefail
          mkdir -p output/diagnostics
          npm test 2>&1 | tee output/diagnostics/verify.log
      - name: Export and verify EP001 timing draft
        shell: bash
        run: |
          set -o pipefail
          node scripts/export_ep001_timing.mjs 2>&1 | tee output/diagnostics/ep001-timing.log
          test -f output/ep001-readthrough/ep001-timing-draft.srt
          test -f output/ep001-readthrough/ep001-timing-report.json
          node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('output/ep001-readthrough/ep001-timing-report.json')); if(r.status!=='temporary_timing_only'||r.pacingStatus!=='pass'||r.targetDurationSeconds!==45.5||r.panelCount!==8||r.subtitleCueCount!==10||r.maximumAllowedCharactersPerSecond!==17||r.maximumCharactersPerSecond>17||r.cuesAboveMaximumCharactersPerSecond.length!==0||r.automaticVoiceApproval!==false||r.automaticCanonApproval!==false) process.exit(1);"
      - name: Verify read-only asset scanner independently
        run: python3 -m unittest tests/test_asset_recovery.py -v
      - name: Render and validate M1 life-sign proof
        shell: bash
        run: |
          set -o pipefail
          mkdir -p output/m1
          python scripts/render_m1.py 2>&1 | tee output/m1/render.log
      - name: Upload M1 proof, timing draft and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ricco-m1-life-sign
          path: |
            output/diagnostics/verify.log
            output/diagnostics/ep001-timing.log
            output/ep001-readthrough/ep001-timing-draft.srt
            output/ep001-readthrough/ep001-timing-report.json
            output/m1/ricco-life-sign.mp4
            output/m1/ricco-life-sign-poster.png
            output/m1/render-report.json
            output/m1/render.log
          if-no-files-found: warn
          retention-days: 14
