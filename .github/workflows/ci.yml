name: Comic Factory CI
on:
  push:
    branches: [main, 'fix/**', 'rebuild/**', 'lr2/**']
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify pull request evidence packet
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/check_pr_evidence.mjs
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deterministic media dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng
          python -m pip install --disable-pip-version-check pillow==11.3.0
      - name: Install locked Studio Foundation dependencies
        run: |
          npm --prefix studio-app ci
          npx --prefix studio-app playwright install chromium
      - name: Verify truth, director, recovery and foundation contracts
        shell: bash
        run: |
          set -o pipefail
          mkdir -p output/diagnostics
          npm test 2>&1 | tee output/diagnostics/verify.log
      - name: Build and browser-test the isolated Studio Foundation
        shell: bash
        run: |
          set -o pipefail
          npm run build:studio 2>&1 | tee output/diagnostics/studio-build.log
          mkdir -p output/studio-site/studio output/studio-site/project output/studio-proof
          cp -R studio-app/dist/. output/studio-site/studio/
          cp project/truth-state.json project/studio-foundation-status.json output/studio-site/project/
          python3 -m http.server 4174 --directory output/studio-site >/tmp/studio-foundation-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for attempt in $(seq 1 20); do
            curl -fsS http://127.0.0.1:4174/studio/ >/dev/null && break
            sleep 1
          done
          node studio-app/tests/browser-smoke.mjs http://127.0.0.1:4174/studio/ --output output/studio-proof 2>&1 | tee output/diagnostics/studio-browser.log
          kill $SERVER_PID 2>/dev/null || true
      - name: Export selected EP001 timing candidate without approving detail canon
        shell: bash
        run: |
          set -o pipefail
          node scripts/export_ep001_timing.mjs 2>&1 | tee output/diagnostics/ep001-timing.log
          test -f output/ep001-readthrough/ep001-timing-draft.srt
          test -f output/ep001-readthrough/ep001-timing-report.json
          node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('output/ep001-readthrough/ep001-timing-report.json')); if(r.status!=='temporary_timing_only'||r.automaticVoiceApproval!==false||r.automaticCanonApproval!==false) process.exit(1);"
      - name: Verify read-only asset scanner independently
        run: python3 -m unittest tests/test_asset_recovery.py -v
      - name: Render and validate M1 technical proof
        shell: bash
        run: |
          set -o pipefail
          mkdir -p output/m1
          python scripts/render_m1.py 2>&1 | tee output/m1/render.log
      - name: Upload technical proof and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comic-lr2-foundation-proof
          path: |
            output/diagnostics/verify.log
            output/diagnostics/studio-build.log
            output/diagnostics/studio-browser.log
            output/studio-proof/studio-runtime-evidence.json
            output/studio-proof/studio-desktop.png
            output/studio-proof/studio-mobile.png
            output/diagnostics/ep001-timing.log
            output/ep001-readthrough/ep001-timing-draft.srt
            output/ep001-readthrough/ep001-timing-report.json
            output/m1/ricco-life-sign.mp4
            output/m1/ricco-life-sign-poster.png
            output/m1/render-report.json
            output/m1/render.log
          if-no-files-found: warn
          retention-days: 14
