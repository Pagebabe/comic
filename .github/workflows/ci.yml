name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - backend-adapters

jobs:
  build:
    name: TypeScript and Vite build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
