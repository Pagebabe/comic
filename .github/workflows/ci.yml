name: Comic Factory CI
on:
  push:
    branches: [main, 'fix/**', 'rebuild/**', 'lr2/**', 'lr3/**', 'lr4/**', 'lr5/**', 'ops/**', 'ui/**', 'worker/**']
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify pull request evidence packet
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/check_pr_evidence.mjs
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deterministic media dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng
          python -m pip install --disable-pip-version-check pillow==11.3.0
      - name: Install locked Studio dependencies and root browser harness
        run: |
          npm --prefix studio-app ci
          npm install
          npm install --no-save playwright@1.61.1
          npx playwright install chromium
      - name: Lint canon and cockpit contracts
        run: npm run lint
      - name: Typecheck Studio
        run: npm run typecheck
      - name: Verify truth, recovery, Academy, readiness, cockpit and fresh-install contracts
        shell: bash
        run: |
          set -o pipefail
          mkdir -p output/diagnostics
          npm test 2>&1 | tee output/diagnostics/verify.log
      - name: Verify cast-canon gate explicitly
        run: npm run test:cast-canon
      - name: Verify cockpit gate explicitly
        run: npm run test:cockpit
      - name: Build Studio and prepare complete browser proof site
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee output/diagnostics/studio-build.log
          rm -rf _site
          mkdir -p _site/studio _site/proof/studio _site/proof/readiness _site/proof/cockpit
          cp index.html app.js lr1-ui.js audit-ui.js styles.css audit.css m1.css _site/
          cp -R project docs lib assets _site/
          cp -R studio-app/dist/. _site/studio/
          touch _site/.nojekyll
      - name: Browser-test dashboard, cockpit, production regressions, Academy and readiness
        shell: bash
        run: |
          set +e
          python3 -m http.server 4174 --directory _site >/tmp/comic-pr-proof-server.log 2>&1 &
          SERVER_PID=$!
          READY=0
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:4174/ >/dev/null && curl -fsS http://127.0.0.1:4174/studio/ >/dev/null; then READY=1; break; fi
            sleep 1
          done
          DASH=1; STUDIO=1; COCKPIT=1; ACADEMY=1; READINESS=1
          if [ "$READY" -eq 1 ]; then
            set -o pipefail
            node scripts/build_visual_proof.mjs http://127.0.0.1:4174/ 2>&1 | tee output/diagnostics/dashboard-browser.log; DASH=${PIPESTATUS[0]}
            node studio-app/tests/browser-smoke.mjs http://127.0.0.1:4174/studio/ --output _site/proof/studio 2>&1 | tee output/diagnostics/studio-browser.log; STUDIO=${PIPESTATUS[0]}
            node studio-app/tests/production-cockpit-smoke.mjs http://127.0.0.1:4174/studio/ --output _site/proof/cockpit 2>&1 | tee output/diagnostics/cockpit-browser.log; COCKPIT=${PIPESTATUS[0]}
            node studio-app/tests/academy-smoke.mjs http://127.0.0.1:4174/studio/ --output _site/proof/studio 2>&1 | tee output/diagnostics/academy-browser.log; ACADEMY=${PIPESTATUS[0]}
            node studio-app/tests/academy-readiness-smoke.mjs http://127.0.0.1:4174/studio/ --output _site/proof/readiness 2>&1 | tee output/diagnostics/readiness-browser.log; READINESS=${PIPESTATUS[0]}
          fi
          cp /tmp/comic-pr-proof-server.log output/diagnostics/browser-server.log 2>/dev/null || true
          kill "$SERVER_PID" 2>/dev/null || true
          if [ "$READY" -ne 1 ] || [ "$DASH" -ne 0 ] || [ "$STUDIO" -ne 0 ] || [ "$COCKPIT" -ne 0 ] || [ "$ACADEMY" -ne 0 ] || [ "$READINESS" -ne 0 ]; then exit 1; fi
      - name: Verify exact Pages, Academy, readiness and cockpit artifact contracts
        shell: bash
        run: |
          set -o pipefail
          node scripts/check_pages_artifact.mjs --site _site --expect-commit "$GITHUB_SHA" 2>&1 | tee output/diagnostics/pages-artifact.log
          node scripts/check_academy_pages_artifact.mjs --site _site --expect-commit "$GITHUB_SHA" 2>&1 | tee output/diagnostics/academy-pages-artifact.log
          node scripts/check_readiness_pages_artifact.mjs --site _site --expect-commit "$GITHUB_SHA" 2>&1 | tee output/diagnostics/readiness-pages-artifact.log
          node scripts/check_cockpit_pages_artifact.mjs --site _site --expect-commit "$GITHUB_SHA" 2>&1 | tee output/diagnostics/cockpit-pages-artifact.log
          node --check scripts/check_public_academy_evidence.mjs
          node --check scripts/check_readiness_public_evidence.mjs
          node --check scripts/check_cockpit_public_evidence.mjs
      - name: Export selected EP001 timing candidate
        run: |
          node scripts/export_ep001_timing.mjs
          test -f output/ep001-readthrough/ep001-timing-draft.srt
          test -f output/ep001-readthrough/ep001-timing-report.json
      - name: Verify read-only asset scanner independently
        run: python3 -m unittest tests/test_asset_recovery.py -v
      - name: Render and validate M1 technical proof
        run: python scripts/render_m1.py
      - name: Upload technical proof and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comic-ui1-production-cockpit-proof
          path: |
            output/diagnostics/
            output/production-academy/academy-check.json
            output/production-cockpit/check.json
            _site/proof/
            output/ep001-readthrough/
            output/m1/
          if-no-files-found: warn
          retention-days: 30
