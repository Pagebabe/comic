name: Comic Factory CI
on:
  push:
    branches: [main, 'fix/**', 'rebuild/**', 'lr2/**', 'lr3/**']
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify pull request evidence packet
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/check_pr_evidence.mjs
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deterministic media dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng
          python -m pip install --disable-pip-version-check pillow==11.3.0
      - name: Install locked Studio dependencies and root browser harness
        run: |
          npm --prefix studio-app ci
          npm install --no-save playwright@1.61.1
          npx playwright install chromium
      - name: Verify truth, director, recovery and foundation contracts
        shell: bash
        run: |
          set -o pipefail
          mkdir -p output/diagnostics
          npm test 2>&1 | tee output/diagnostics/verify.log
      - name: Build Studio Foundation and prepare complete browser proof site
        shell: bash
        run: |
          set -o pipefail
          npm run build:studio 2>&1 | tee output/diagnostics/studio-build.log
          rm -rf _site
          mkdir -p _site/studio _site/proof/studio
          cp index.html app.js lr1-ui.js audit-ui.js styles.css audit.css m1.css _site/
          cp -R project _site/
          cp -R lib _site/
          cp -R assets _site/
          cp -R studio-app/dist/. _site/studio/
          touch _site/.nojekyll
      - name: Browser-test dashboard and Studio before merge
        shell: bash
        run: |
          set +e
          mkdir -p output/diagnostics _site/proof/studio
          python3 -m http.server 4174 --directory _site >/tmp/comic-pr-proof-server.log 2>&1 &
          SERVER_PID=$!
          READY=0
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:4174/ >/dev/null && curl -fsS http://127.0.0.1:4174/studio/ >/dev/null; then
              READY=1
              break
            fi
            sleep 1
          done
          DASH_STATUS=1
          STUDIO_STATUS=1
          if [ "$READY" -eq 1 ]; then
            set -o pipefail
            node scripts/build_visual_proof.mjs http://127.0.0.1:4174/ 2>&1 | tee output/diagnostics/dashboard-browser.log
            DASH_STATUS=${PIPESTATUS[0]}
            node studio-app/tests/browser-smoke.mjs http://127.0.0.1:4174/studio/ --output _site/proof/studio 2>&1 | tee output/diagnostics/studio-browser.log
            STUDIO_STATUS=${PIPESTATUS[0]}
          else
            echo 'Local browser proof server did not become ready.' | tee output/diagnostics/dashboard-browser.log output/diagnostics/studio-browser.log
          fi
          cp /tmp/comic-pr-proof-server.log output/diagnostics/browser-server.log 2>/dev/null || true
          kill "$SERVER_PID" 2>/dev/null || true
          if [ "$READY" -ne 1 ] || [ "$DASH_STATUS" -ne 0 ] || [ "$STUDIO_STATUS" -ne 0 ]; then
            exit 1
          fi
      - name: Export selected EP001 timing candidate without approving detail canon
        shell: bash
        run: |
          set -o pipefail
          node scripts/export_ep001_timing.mjs 2>&1 | tee output/diagnostics/ep001-timing.log
          test -f output/ep001-readthrough/ep001-timing-draft.srt
          test -f output/ep001-readthrough/ep001-timing-report.json
          node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('output/ep001-readthrough/ep001-timing-report.json')); if(r.status!=='temporary_timing_only'||r.automaticVoiceApproval!==false||r.automaticCanonApproval!==false) process.exit(1);"
      - name: Verify read-only asset scanner independently
        run: python3 -m unittest tests/test_asset_recovery.py -v
      - name: Render and validate M1 technical proof
        shell: bash
        run: |
          set -o pipefail
          mkdir -p output/m1
          python scripts/render_m1.py 2>&1 | tee output/m1/render.log
      - name: Upload technical proof and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comic-lr3-browser-proof
          path: |
            output/diagnostics/verify.log
            output/diagnostics/studio-build.log
            output/diagnostics/dashboard-browser.log
            output/diagnostics/studio-browser.log
            output/diagnostics/browser-server.log
            _site/proof/runtime-evidence.json
            _site/proof/dashboard-desktop.png
            _site/proof/dashboard-mobile.png
            _site/proof/studio/studio-runtime-evidence.json
            _site/proof/studio/studio-desktop.png
            _site/proof/studio/studio-mobile.png
            output/diagnostics/ep001-timing.log
            output/ep001-readthrough/ep001-timing-draft.srt
            output/ep001-readthrough/ep001-timing-report.json
            output/m1/ricco-life-sign.mp4
            output/m1/ricco-life-sign-poster.png
            output/m1/render-report.json
            output/m1/render.log
          if-no-files-found: warn
          retention-days: 14
