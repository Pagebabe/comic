name: Program Evidence Gate

on:
  push:
    branches:
      - worker/program-evidence-gate
  pull_request:
    branches:
      - main
    paths:
      - 'project/program-evidence-manifest.json'
      - 'project/schemas/program-evidence-manifest-v1.schema.json'
      - 'project/fixtures/program-evidence-*.json'
      - 'scripts/check_program_evidence.mjs'
      - 'tests/program-evidence-gate.test.mjs'
      - 'docs/release/**'
      - 'docs/reports/WORKER_5_PROGRAM_EVIDENCE_REPORT.md'
      - '.github/workflows/program-evidence-gate.yml'

permissions:
  contents: read

jobs:
  program-evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout control branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch exact worker evidence refs
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            worker/canon-lock:refs/remotes/origin/worker/canon-lock \
            worker/episode1-proof:refs/remotes/origin/worker/episode1-proof \
            worker/mkt0-shadow-integration:refs/remotes/origin/worker/mkt0-shadow-integration \
            feature/mkt1-001-factory-handoff:refs/remotes/origin/feature/mkt1-001-factory-handoff \
            main:refs/remotes/origin/main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Parse contracts and check validator syntax
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/check_program_evidence.mjs
          node -e "JSON.parse(require('node:fs').readFileSync('project/program-evidence-manifest.json','utf8'))"
          node -e "JSON.parse(require('node:fs').readFileSync('project/schemas/program-evidence-manifest-v1.schema.json','utf8'))"

      - name: Run program evidence manipulation tests
        shell: bash
        run: |
          set -euo pipefail
          node --test --test-concurrency=1 tests/program-evidence-gate.test.mjs

      - name: Verify exact worker refs, reports and artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output/program-evidence
          node scripts/check_program_evidence.mjs \
            --output output/program-evidence/program-evidence-proof.json \
            | tee output/program-evidence/program-evidence-check.log

      - name: Record repository script availability
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const scripts = pkg.scripts || {};
          const result = {};
          for (const name of ['lint', 'typecheck', 'test', 'build', 'build:studio']) {
            result[name] = Object.hasOwn(scripts, name) ? 'DEFINED' : 'NOT_DEFINED';
          }
          fs.writeFileSync(
            'output/program-evidence/conventional-script-availability.json',
            `${JSON.stringify(result, null, 2)}\n`
          );
          console.log(JSON.stringify(result));
          NODE

      - name: Install existing repository test dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng
          python3 -m pip install --disable-pip-version-check pillow==11.3.0
          npm --prefix studio-app ci

      - name: Run defined repository regressions
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output/program-evidence
          for script in lint typecheck; do
            if node -e "const p=require('./package.json'); process.exit(p.scripts?.['$script'] ? 0 : 1)"; then
              npm run "$script" 2>&1 | tee "output/program-evidence/${script}.log"
            else
              echo "$script: NOT_DEFINED" | tee "output/program-evidence/${script}.log"
            fi
          done

          npm test 2>&1 | tee output/program-evidence/npm-test.log

          if node -e "const p=require('./package.json'); process.exit(p.scripts?.build ? 0 : 1)"; then
            npm run build 2>&1 | tee output/program-evidence/build.log
          else
            echo "build: NOT_DEFINED" | tee output/program-evidence/build.log
          fi

          npm run build:studio 2>&1 | tee output/program-evidence/build-studio.log

      - name: Recheck control plane after repository regressions
        shell: bash
        run: |
          set -euo pipefail
          node scripts/check_program_evidence.mjs \
            --output output/program-evidence/program-evidence-proof.json

      - name: Upload static program evidence proof
        uses: actions/upload-artifact@v4
        with:
          name: comic-program-evidence-gate-${{ github.sha }}
          path: |
            project/program-evidence-manifest.json
            project/schemas/program-evidence-manifest-v1.schema.json
            docs/release/
            output/program-evidence/
          if-no-files-found: error
          retention-days: 30
