name: Deploy Comic Factory Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: comic-factory-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deterministic media and browser dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng
          python -m pip install --disable-pip-version-check pillow==11.3.0
          npm install --no-save playwright@1.55.0
          npx playwright install chromium

      - name: Verify retroactive evidence chain
        run: node scripts/check_evidence_chain.mjs

      - name: Export EP001 timing draft
        run: node scripts/export_ep001_timing.mjs

      - name: Render and validate M1 life-sign proof
        run: python scripts/render_m1.py

      - name: Build static dashboard artifact
        run: |
          mkdir -p _site/project/merge-bibles _site/lib _site/media/m1 _site/media/ep001 _site/docs _site/proof
          cp index.html app.js audit-ui.js styles.css audit.css m1.css _site/
          cp project/project.json _site/project/
          cp project/canon.json _site/project/
          cp project/evidence-chain.json _site/project/
          cp project/evidence-closure.json _site/project/
          cp project/visual-preproduction.json _site/project/
          cp project/ep001-animatic-blueprint.json _site/project/
          cp project/character-library.json _site/project/
          cp project/character-production-sheets.json _site/project/
          cp project/lora-training-sheets.json _site/project/
          cp project/cast-variants.json _site/project/
          cp project/cast-merge-decisions.json _site/project/
          cp project/merge-bibles/*.json _site/project/merge-bibles/
          cp docs/RETROACTIVE_EVIDENCE_AUDIT.md _site/docs/
          cp lib/context.mjs lib/browser-director.mjs _site/lib/
          cp -R assets _site/
          cp output/ep001-readthrough/ep001-timing-draft.srt _site/media/ep001/
          cp output/ep001-readthrough/ep001-timing-report.json _site/media/ep001/
          cp output/m1/ricco-life-sign.mp4 _site/media/m1/
          cp output/m1/ricco-life-sign-poster.png _site/media/m1/
          cp output/m1/render-report.json _site/media/m1/
          touch _site/.nojekyll

      - name: Render desktop and mobile visual proof
        run: |
          python3 -m http.server 4173 --directory _site >/tmp/comic-proof-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for attempt in $(seq 1 20); do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && break
            sleep 1
          done
          node scripts/build_visual_proof.mjs http://127.0.0.1:4173/
          kill $SERVER_PID 2>/dev/null || true

      - name: Verify published canon artifact before deployment and evidence publication
        run: |
          test -f _site/audit-ui.js
          test -f _site/audit.css
          test -f _site/project/canon.json
          test -f _site/project/evidence-chain.json
          test -f _site/project/evidence-closure.json
          test -f _site/proof/runtime-evidence.json
          test -f _site/proof/dashboard-desktop.png
          test -f _site/proof/dashboard-mobile.png
          test -f _site/project/visual-preproduction.json
          test -f _site/project/ep001-animatic-blueprint.json
          test -f _site/project/cast-merge-decisions.json
          test -f _site/project/merge-bibles/ricco.json
          test -f _site/project/merge-bibles/basti-prenzl.json
          test -f _site/project/merge-bibles/jule.json
          test -f _site/project/merge-bibles/don-miau.json
          test -f _site/project/character-library.json
          test -f _site/project/character-production-sheets.json
          test -f _site/project/lora-training-sheets.json
          test -f _site/docs/RETROACTIVE_EVIDENCE_AUDIT.md
          test -f _site/media/ep001/ep001-timing-draft.srt
          test -f _site/media/ep001/ep001-timing-report.json
          grep -q 'VISUAL OFFEN' _site/audit-ui.js
          grep -q '100%-Closure-Manifest' _site/audit-ui.js
          node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync('_site/project/evidence-closure.json')); if(c.status!=='coverage_closed'||c.coverage.percent!==100||c.coverage.trackedEntries!==23||c.coverage.terminallyClassified!==23) process.exit(1);"
          node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('_site/proof/runtime-evidence.json')); if(r.status!=='pass'||r.commit!==process.env.GITHUB_SHA||r.evidenceCoveragePercent!==100||r.targets.length!==2||r.targets.some(x=>x.checks.visiblePortraitImages!==0||x.checks.visualOpenLabels!==4||x.checks.horizontalOverflowPixels>2)) process.exit(1);"
          node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync('_site/project/canon.json')); if(c.activeGate!=='M1R'||c.verifiedInventory.lockedTextCharacterBibles!==4) process.exit(1);"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('_site/project/visual-preproduction.json')); if(p.generator.allowedNow!==false||p.characterSheets.length!==4||p.locationSheets.length!==4) process.exit(1);"
          node -e "const fs=require('fs'); const a=JSON.parse(fs.readFileSync('_site/project/ep001-animatic-blueprint.json')); const total=a.panels.reduce((s,p)=>s+p.durationSeconds,0); if(a.panels.length!==8||total!==45.5||a.canonRules.automaticRenderAllowed!==false) process.exit(1);"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy dashboard
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify public runtime proof after deployment
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS "${PAGE_URL}proof/runtime-evidence.json?sha=${GITHUB_SHA}" -o /tmp/runtime-evidence.json; then
              node -e "const r=require('/tmp/runtime-evidence.json'); if(r.commit!==process.env.GITHUB_SHA||r.status!=='pass'||r.evidenceCoveragePercent!==100) process.exit(1);" && break
            fi
            sleep 5
          done
          curl -fsS "${PAGE_URL}proof/dashboard-desktop.png?sha=${GITHUB_SHA}" -o /tmp/dashboard-desktop.png
          curl -fsS "${PAGE_URL}proof/dashboard-mobile.png?sha=${GITHUB_SHA}" -o /tmp/dashboard-mobile.png
          node - <<'NODE'
          const fs=require('fs'); const crypto=require('crypto');
          const r=JSON.parse(fs.readFileSync('/tmp/runtime-evidence.json'));
          for (const target of r.targets) {
            const path=`/tmp/dashboard-${target.name}.png`;
            const hash=crypto.createHash('sha256').update(fs.readFileSync(path)).digest('hex');
            if(hash!==target.sha256) throw new Error(`${target.name} public screenshot hash mismatch`);
          }
          NODE

      - name: Publish deployment proof
        uses: actions/github-script@v7
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          DEPLOY_SHA: ${{ github.sha }}
        with:
          script: |
            const title = '[DEPLOY PROOF] Comic Factory Dashboard online';
            const body = [
              '## Verifizierter Online-Stand',
              '',
              `- URL: ${process.env.PAGE_URL}`,
              `- Commit: ${process.env.DEPLOY_SHA}`,
              `- Workflow-Run: ${context.runId}`,
              `- Beweiskettenabdeckung: 100% · 23/23 terminal klassifiziert`,
              `- Runtime-Beweis: ${process.env.PAGE_URL}proof/runtime-evidence.json`,
              `- Desktop-Gegenprüfung: ${process.env.PAGE_URL}proof/dashboard-desktop.png`,
              `- Mobil-Gegenprüfung: ${process.env.PAGE_URL}proof/dashboard-mobile.png`,
              `- Closure-Manifest: ${process.env.PAGE_URL}project/evidence-closure.json`,
              `- Text-Canon: 4/4`,
              `- Visual-Master: 0/4 Figuren · 0/4 Sets`,
              `- Stimmen: 0/3`,
              `- Animatic-Bilder: 0/8`,
              `- Freigegebene Finalfolge: nein`,
              `- Verifiziert: ${new Date().toISOString()}`,
              '',
              '100% bezeichnet die vollständige Beweiskettenabdeckung. Nicht gebaute Produktassets bleiben ausdrücklich als not_yet_built klassifiziert.'
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100 });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);
            if (existing) await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            else await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });
