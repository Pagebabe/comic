name: Deploy Comic Factory Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: comic-factory-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install media, browser and locked Studio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng
          python -m pip install --disable-pip-version-check pillow==11.3.0
          npm install --no-save playwright@1.61.1
          npm --prefix studio-app ci
          npx playwright install chromium

      - name: Verify LR4 closure and active LR5 contracts
        run: |
          node scripts/check.mjs
          node scripts/check_evidence_chain.mjs
          node scripts/check_studio_foundation.mjs
          node scripts/check_production_loop.mjs
          node scripts/check_selected_pilot_loop.mjs

      - name: Build verified Studio with LR3 and LR4 regression routes
        run: |
          npm --prefix studio-app run build
          node scripts/check_studio_foundation.mjs --require-dist
          node scripts/check_production_loop.mjs
          node scripts/check_selected_pilot_loop.mjs

      - name: Export selected pilot timing candidate
        run: node scripts/export_ep001_timing.mjs

      - name: Render M1 technical proof
        run: python scripts/render_m1.py

      - name: Build static dashboard and Studio artifact
        run: |
          rm -rf _site
          mkdir -p _site/proof/studio _site/studio _site/media/m1 _site/media/ep001
          cp index.html app.js lr1-ui.js audit-ui.js styles.css audit.css m1.css _site/
          cp -R project docs lib assets _site/
          cp -R studio-app/dist/. _site/studio/
          cp output/ep001-readthrough/ep001-timing-draft.srt _site/media/ep001/
          cp output/ep001-readthrough/ep001-timing-report.json _site/media/ep001/
          cp output/m1/ricco-life-sign.mp4 _site/media/m1/
          cp output/m1/ricco-life-sign-poster.png _site/media/m1/
          cp output/m1/render-report.json _site/media/m1/
          touch _site/.nojekyll

      - name: Render LR4 closure dashboard and LR3 LR4 regression proof
        run: |
          python3 -m http.server 4173 --directory _site >/tmp/comic-proof-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          READY=0
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null && curl -fsS http://127.0.0.1:4173/studio/ >/dev/null; then
              READY=1
              break
            fi
            sleep 1
          done
          test "$READY" = 1
          node scripts/build_visual_proof.mjs http://127.0.0.1:4173/
          node studio-app/tests/browser-smoke.mjs http://127.0.0.1:4173/studio/ --output _site/proof/studio
          kill $SERVER_PID 2>/dev/null || true

      - name: Verify artifact before deployment
        run: |
          for file in \
            _site/lr1-ui.js \
            _site/studio/index.html \
            _site/project/truth-state.json \
            _site/project/pilot-decision-record.json \
            _site/project/studio-foundation-closure.json \
            _site/project/lr3-production-loop-closure.json \
            _site/project/lr4-selected-pilot-source-inventory.json \
            _site/project/lr4-selected-pilot-closure.json \
            _site/docs/LR3_MINIMAL_PRODUCTION_LOOP.md \
            _site/docs/LR4_SELECTED_PILOT_FIRE_TEST.md \
            _site/proof/runtime-evidence.json \
            _site/proof/dashboard-desktop.png \
            _site/proof/dashboard-mobile.png \
            _site/proof/studio/studio-runtime-evidence.json \
            _site/proof/studio/studio-desktop.png \
            _site/proof/studio/studio-mobile.png \
            _site/media/m1/ricco-life-sign.mp4 \
            _site/media/m1/render-report.json; do test -f "$file"; done

          node - <<'NODE'
          const fs = require('fs');
          const truth = JSON.parse(fs.readFileSync('_site/project/truth-state.json'));
          const decision = JSON.parse(fs.readFileSync('_site/project/pilot-decision-record.json'));
          const foundationClosure = JSON.parse(fs.readFileSync('_site/project/studio-foundation-closure.json'));
          const loopClosure = JSON.parse(fs.readFileSync('_site/project/lr3-production-loop-closure.json'));
          const pilotInventory = JSON.parse(fs.readFileSync('_site/project/lr4-selected-pilot-source-inventory.json'));
          const pilotClosure = JSON.parse(fs.readFileSync('_site/project/lr4-selected-pilot-closure.json'));
          const runtime = JSON.parse(fs.readFileSync('_site/proof/runtime-evidence.json'));
          const studioRuntime = JSON.parse(fs.readFileSync('_site/proof/studio/studio-runtime-evidence.json'));

          if (truth.status !== 'recovery_line_active' || truth.trackingIssue !== 82 || truth.canon.selectedPilot !== 'pilot-das-zimmer') process.exit(1);
          for (const gate of ['LR0','LR1','LR2','LR3','LR4']) if (truth.nextSequence.find(x=>x.id===gate)?.status !== 'done') process.exit(1);
          if (truth.nextSequence.find(x=>x.id==='LR5')?.status !== 'active_recovery_gate' || truth.nextSequence.find(x=>x.id==='LR5')?.trackingIssue !== 82) process.exit(1);
          if (decision.status !== 'human_decision_recorded' || decision.selectedCandidateId !== 'pilot-das-zimmer') process.exit(1);
          if (foundationClosure.status !== 'closed_verified' || foundationClosure.pullRequest?.number !== 59 || foundationClosure.deployment?.runId !== 29148728164) process.exit(1);
          if (loopClosure.status !== 'closed_verified' || loopClosure.implementedBy?.pullRequest !== 74 || loopClosure.implementedBy?.ciRun !== 29150833651 || loopClosure.implementedBy?.mergeCommit !== '0226b80ae36457c95efb2e4dbbb0546623d274ae' || loopClosure.publicProof?.pagesRun !== 29150875221 || loopClosure.proof?.stationsPassed !== 9 || loopClosure.proof?.deleteRestoreHashMatch !== true || loopClosure.proof?.creativeApprovalGranted !== false) process.exit(1);
          if (pilotInventory.gate !== 'LR4' || pilotInventory.trackingIssue !== 76 || pilotInventory.sources?.length !== 7 || pilotInventory.candidateCounts?.panels !== 8 || pilotInventory.candidateCounts?.dialogueCues !== 10 || pilotInventory.candidateCounts?.targetDurationSeconds !== 45.5 || pilotInventory.sources.some(source=>source.creativeApproval!==false)) process.exit(1);
          if (pilotClosure.status !== 'closed_verified' || pilotClosure.implementedBy?.pullRequest !== 81 || pilotClosure.implementedBy?.verifiedHead !== 'a55a24e24bdae0bbf2b980f2842f57f0653092ca' || pilotClosure.implementedBy?.ciRun !== 29152706460 || pilotClosure.implementedBy?.mergeCommit !== '63021f49152dee7375578537be13dafd65685391' || pilotClosure.publicProof?.pagesRun !== 29152807415 || pilotClosure.publicProof?.publicVerificationPassed !== true || pilotClosure.nextGate?.trackingIssue !== 82) process.exit(1);
          if (pilotClosure.proof?.stationsPassed !== 9 || pilotClosure.proof?.panelCount !== 8 || pilotClosure.proof?.dialogueCueCount !== 10 || pilotClosure.proof?.candidateDurationSeconds !== 45.5 || pilotClosure.proof?.stateActuallyDeleted !== true || pilotClosure.proof?.packageRetainedDuringDeletion !== true || pilotClosure.proof?.deleteRestoreHashMatch !== true || pilotClosure.proof?.stateHash !== '97b8216fbb11059a5f8fa0e3748ea8fa1e03706e15174c307ffe9ce84ca8c2cf' || pilotClosure.proof?.packageHash !== 'b6d2c8814dfc5cc558c5d7dd81113e71eafc51f531515fd7b4e9e8ec5a2ad196' || pilotClosure.proof?.imageBytesUsed !== false || pilotClosure.proof?.externalExecutionUsed !== false || pilotClosure.proof?.creativeApprovalGranted !== false) process.exit(1);

          if (runtime.status !== 'pass' || runtime.commit !== process.env.GITHUB_SHA || runtime.closedGate !== 'LR4' || runtime.activeGate !== 'LR5' || runtime.activeTrackingIssue !== 82 || runtime.lr4ClosureStatus !== 'closed_verified' || runtime.selectedPilotFireTestPassed !== true || runtime.characterMastersApproved !== 0 || runtime.locationMastersApproved !== 0 || runtime.voiceMastersApproved !== 0 || runtime.finishedEpisodes !== 0) process.exit(1);
          if (studioRuntime.status !== 'pass' || studioRuntime.commit !== process.env.GITHUB_SHA || studioRuntime.closedGate !== 'LR4' || studioRuntime.activeGate !== 'LR5' || studioRuntime.activeTrackingIssue !== 82 || studioRuntime.selectedPilotFireTestClosureStatus !== 'closed_verified' || studioRuntime.productionLoopRestored !== true || studioRuntime.selectedPilotFireTestPassed !== true || studioRuntime.selectedPilotDetailsStatus !== 'REVIEW_REQUIRED') process.exit(1);
          if (studioRuntime.stateHash !== loopClosure.proof.stateHash || studioRuntime.packageHash !== loopClosure.proof.packageHash || studioRuntime.selectedPilotStateHash !== pilotClosure.proof.stateHash || studioRuntime.selectedPilotPackageHash !== pilotClosure.proof.packageHash || studioRuntime.selectedPilotPanelCount !== 8 || studioRuntime.selectedPilotDialogueCueCount !== 10 || studioRuntime.selectedPilotCandidateDurationSeconds !== 45.5) process.exit(1);
          if (studioRuntime.characterMastersApproved !== 0 || studioRuntime.locationMastersApproved !== 0 || studioRuntime.voiceMastersApproved !== 0 || studioRuntime.imageBytesUsed !== false || studioRuntime.externalExecutionUsed !== false || studioRuntime.creativeApprovalGranted !== false) process.exit(1);
          if (runtime.targets.length !== 2 || runtime.targets.some(t=>!t.checks.lr4ClosedPresent || !t.checks.lr5ActivePresent || !t.checks.masterBoundaryPresent || t.checks.horizontalOverflowPixels>2 || t.checks.visiblePortraitImages!==0)) process.exit(1);
          if (studioRuntime.targets.length !== 2 || studioRuntime.targets.some(t=>
            !t.checks.foundation.lr4ClosedPresent || !t.checks.foundation.lr5ActivePresent || !t.checks.foundation.masterBoundaryPresent ||
            !t.checks.lr3Deletion.stateRemoved || !t.checks.lr3Deletion.packageRetained || !t.checks.lr3Loop.deleteRestorePassPresent || !t.checks.lr3Loop.hashMatchPresent || t.checks.lr3Loop.passedStationCount!==9 || t.checks.lr3Loop.stateHashBeforeDelete!==t.checks.lr3Loop.stateHashAfterRestore ||
            !t.checks.pilotDeletion.stateRemoved || !t.checks.pilotDeletion.packageRetained || !t.checks.pilotLoop.deleteRestorePassPresent || !t.checks.pilotLoop.hashMatchPresent || t.checks.pilotLoop.passedStationCount!==9 || t.checks.pilotLoop.stateHashBeforeDelete!==t.checks.pilotLoop.stateHashAfterRestore || !t.checks.pilotLoop.reviewRequiredPresent || t.checks.pilotLoop.forbiddenCreativeApproval || t.checks.pilotLoop.horizontalOverflowPixels>2 || t.checks.pilotLoop.imageCount!==0
          )) process.exit(1);
          NODE

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy dashboard and Studio
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify public LR4 closure and LR5 handoff
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          VERIFIED=0
          for attempt in $(seq 1 30); do
            if curl -fsS "${PAGE_URL}proof/runtime-evidence.json?sha=${GITHUB_SHA}" -o /tmp/runtime-evidence.json && curl -fsS "${PAGE_URL}studio/?sha=${GITHUB_SHA}" -o /tmp/studio-index.html; then
              if node -e "const r=require('/tmp/runtime-evidence.json'); if(r.commit!==process.env.GITHUB_SHA||r.status!=='pass'||r.closedGate!=='LR4'||r.activeGate!=='LR5'||r.activeTrackingIssue!==82||r.selectedPilot!=='pilot-das-zimmer'||r.productionLoopRestored!==true||r.selectedPilotFireTestPassed!==true||r.characterMastersApproved!==0||r.locationMastersApproved!==0||r.voiceMastersApproved!==0) process.exit(1);"; then
                VERIFIED=1
                break
              fi
            fi
            sleep 5
          done
          test "$VERIFIED" = 1

          curl -fsS "${PAGE_URL}project/lr3-production-loop-closure.json?sha=${GITHUB_SHA}" -o /tmp/lr3-production-loop-closure.json
          curl -fsS "${PAGE_URL}project/lr4-selected-pilot-closure.json?sha=${GITHUB_SHA}" -o /tmp/lr4-selected-pilot-closure.json
          curl -fsS "${PAGE_URL}proof/studio/studio-runtime-evidence.json?sha=${GITHUB_SHA}" -o /tmp/studio-runtime-evidence.json
          curl -fsS "${PAGE_URL}proof/dashboard-desktop.png?sha=${GITHUB_SHA}" -o /tmp/dashboard-desktop.png
          curl -fsS "${PAGE_URL}proof/dashboard-mobile.png?sha=${GITHUB_SHA}" -o /tmp/dashboard-mobile.png
          curl -fsS "${PAGE_URL}proof/studio/studio-desktop.png?sha=${GITHUB_SHA}" -o /tmp/studio-desktop.png
          curl -fsS "${PAGE_URL}proof/studio/studio-mobile.png?sha=${GITHUB_SHA}" -o /tmp/studio-mobile.png

          node -e "const c=require('/tmp/lr4-selected-pilot-closure.json'); if(c.status!=='closed_verified'||c.implementedBy?.pullRequest!==81||c.implementedBy?.ciRun!==29152706460||c.implementedBy?.mergeCommit!=='63021f49152dee7375578537be13dafd65685391'||c.publicProof?.pagesRun!==29152807415||c.proof?.stationsPassed!==9||c.proof?.deleteRestoreHashMatch!==true||c.nextGate?.trackingIssue!==82) process.exit(1);"
          node studio-app/tests/browser-smoke.mjs "${PAGE_URL}studio/" --output /tmp/studio-public-proof

          node - <<'NODE'
          const fs=require('fs');
          const crypto=require('crypto');
          const dashboard=JSON.parse(fs.readFileSync('/tmp/runtime-evidence.json'));
          const deployed=JSON.parse(fs.readFileSync('/tmp/studio-runtime-evidence.json'));
          const live=JSON.parse(fs.readFileSync('/tmp/studio-public-proof/studio-runtime-evidence.json'));
          const loopClosure=JSON.parse(fs.readFileSync('/tmp/lr3-production-loop-closure.json'));
          const pilotClosure=JSON.parse(fs.readFileSync('/tmp/lr4-selected-pilot-closure.json'));

          for (const r of [deployed, live]) {
            if(r.status!=='pass'||r.closedGate!=='LR4'||r.productionLoopClosureStatus!=='closed_verified'||r.selectedPilotFireTestClosureStatus!=='closed_verified'||r.activeGate!=='LR5'||r.activeTrackingIssue!==82||r.productionLoopRestored!==true||r.selectedPilotFireTestPassed!==true||r.selectedPilotDetailsStatus!=='REVIEW_REQUIRED') process.exit(1);
            if(r.stateHash!==loopClosure.proof.stateHash||r.packageHash!==loopClosure.proof.packageHash||r.selectedPilotStateHash!==pilotClosure.proof.stateHash||r.selectedPilotPackageHash!==pilotClosure.proof.packageHash||r.selectedPilotPanelCount!==8||r.selectedPilotDialogueCueCount!==10||r.selectedPilotCandidateDurationSeconds!==45.5||r.characterMastersApproved!==0||r.locationMastersApproved!==0||r.voiceMastersApproved!==0||r.imageBytesUsed!==false||r.externalExecutionUsed!==false||r.creativeApprovalGranted!==false) process.exit(1);
            for (const target of r.targets) {
              if(!target.checks.foundation.lr4ClosedPresent||!target.checks.foundation.lr5ActivePresent||!target.checks.foundation.masterBoundaryPresent||!target.checks.lr3Deletion.stateRemoved||!target.checks.lr3Deletion.packageRetained||!target.checks.lr3Loop.deleteRestorePassPresent||!target.checks.lr3Loop.hashMatchPresent||target.checks.lr3Loop.passedStationCount!==9||target.checks.lr3Loop.stateHashBeforeDelete!==target.checks.lr3Loop.stateHashAfterRestore) process.exit(1);
              if(!target.checks.pilotDeletion.stateRemoved||!target.checks.pilotDeletion.packageRetained||!target.checks.pilotLoop.deleteRestorePassPresent||!target.checks.pilotLoop.hashMatchPresent||target.checks.pilotLoop.passedStationCount!==9||target.checks.pilotLoop.stateHashBeforeDelete!==target.checks.pilotLoop.stateHashAfterRestore||!target.checks.pilotLoop.reviewRequiredPresent||target.checks.pilotLoop.forbiddenCreativeApproval) process.exit(1);
            }
          }
          if(deployed.commit!==process.env.GITHUB_SHA || dashboard.commit!==process.env.GITHUB_SHA) process.exit(1);
          if(deployed.selectedPilotStateHash!==live.selectedPilotStateHash||deployed.selectedPilotPackageHash!==live.selectedPilotPackageHash) process.exit(1);

          for (const target of dashboard.targets) {
            const hash=crypto.createHash('sha256').update(fs.readFileSync(`/tmp/dashboard-${target.name}.png`)).digest('hex');
            if(hash!==target.sha256) throw new Error(`${target.name} dashboard screenshot hash mismatch`);
          }
          for (const target of deployed.targets) {
            const hash=crypto.createHash('sha256').update(fs.readFileSync(`/tmp/studio-${target.name}.png`)).digest('hex');
            if(hash!==target.sha256) throw new Error(`${target.name} Studio screenshot hash mismatch`);
            const liveTarget=live.targets.find(item=>item.name===target.name);
            if(!liveTarget || liveTarget.sha256!==target.sha256) throw new Error(`${target.name} live Studio screenshot differs from deployed proof`);
          }
          NODE

      - name: Publish LR4 closure and LR5 handoff proof
        uses: actions/github-script@v7
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          DEPLOY_SHA: ${{ github.sha }}
        with:
          script: |
            const fs = require('fs');
            const runtime = JSON.parse(fs.readFileSync('/tmp/runtime-evidence.json'));
            const studioRuntime = JSON.parse(fs.readFileSync('/tmp/studio-runtime-evidence.json'));
            const loopClosure = JSON.parse(fs.readFileSync('/tmp/lr3-production-loop-closure.json'));
            const pilotClosure = JSON.parse(fs.readFileSync('/tmp/lr4-selected-pilot-closure.json'));
            const title = '[DEPLOY PROOF] Comic Factory Dashboard online';
            const body = [
              '## Verifizierter Recovery-Line-Stand',
              '',
              `- URL: ${process.env.PAGE_URL}`,
              `- Commit: ${process.env.DEPLOY_SHA}`,
              `- Workflow-Run: ${context.runId}`,
              `- LR0 Truth Reset: CLOSED_VERIFIED`,
              `- LR1 Pilotentscheidung: HUMAN_DECISION_RECORDED`,
              `- LR2 Studio Foundation: CLOSED_VERIFIED`,
              `- LR3 neutraler Produktionsloop: CLOSED_VERIFIED`,
              `- LR4 Selected-Pilot-Fire-Test: CLOSED_VERIFIED`,
              `- LR4 Implementierungs-PR: #${pilotClosure.implementedBy.pullRequest}`,
              `- LR4 geprüfter Head: ${pilotClosure.implementedBy.verifiedHead}`,
              `- LR4 Implementierungs-CI: ${pilotClosure.implementedBy.ciRun}`,
              `- LR4 Implementierungs-Merge: ${pilotClosure.implementedBy.mergeCommit}`,
              `- LR4 ursprünglicher Pages-Beweis: ${pilotClosure.publicProof.pagesRun}`,
              `- LR4 Stationen: ${studioRuntime.stationsPassed}/9`,
              `- LR4 Zustand tatsächlich gelöscht: ${studioRuntime.deleteCountercheckPassed ? 'ja' : 'nein'}`,
              `- LR4 Restore-Hash-Match: ${studioRuntime.deleteRestoreHashMatch ? 'ja' : 'nein'}`,
              `- LR4 Zustandshash: ${studioRuntime.selectedPilotStateHash}`,
              `- LR4 Package-Hash: ${studioRuntime.selectedPilotPackageHash}`,
              `- LR4 Panels: ${studioRuntime.selectedPilotPanelCount}`,
              `- LR4 Dialogkandidaten: ${studioRuntime.selectedPilotDialogueCueCount}`,
              `- LR4 Kandidatendauer: ${studioRuntime.selectedPilotCandidateDurationSeconds} Sekunden`,
              `- LR4 Detailstatus: ${studioRuntime.selectedPilotDetailsStatus}`,
              `- Aktives Gate: LR5 · Issue #82`,
              `- Ausgewählter Pilot: Das Zimmer`,
              `- Character-Master: 0/4`,
              `- Location-Master: 0/4`,
              `- Stimmen: 0/3`,
              `- fertige Episode: nein`,
              `- Bildbytes verwendet: ${studioRuntime.imageBytesUsed ? 'ja' : 'nein'}`,
              `- externe Ausführung: ${studioRuntime.externalExecutionUsed ? 'ja' : 'nein'}`,
              `- kreative Freigabe: ${studioRuntime.creativeApprovalGranted ? 'ja' : 'nein'}`,
              `- Studio-Route: ${process.env.PAGE_URL}studio/`,
              `- LR4 Regression-Route: ${process.env.PAGE_URL}studio/#pilot-fire-test`,
              `- LR4 Closure: ${process.env.PAGE_URL}project/lr4-selected-pilot-closure.json`,
              `- LR4 Inventar: ${process.env.PAGE_URL}project/lr4-selected-pilot-source-inventory.json`,
              `- LR4 Dokumentation: ${process.env.PAGE_URL}docs/LR4_SELECTED_PILOT_FIRE_TEST.md`,
              `- LR3 Closure: ${process.env.PAGE_URL}project/lr3-production-loop-closure.json`,
              `- Dashboard-Runtime-Beweis: ${process.env.PAGE_URL}proof/runtime-evidence.json`,
              `- Studio-Runtime-Beweis: ${process.env.PAGE_URL}proof/studio/studio-runtime-evidence.json`,
              `- Dashboard-Desktop: ${process.env.PAGE_URL}proof/dashboard-desktop.png`,
              `- Dashboard-Mobil: ${process.env.PAGE_URL}proof/dashboard-mobile.png`,
              `- Studio-Desktop: ${process.env.PAGE_URL}proof/studio/studio-desktop.png`,
              `- Studio-Mobil: ${process.env.PAGE_URL}proof/studio/studio-mobile.png`,
              `- Aktuelle Evidence: partiell und quellgebunden; keine Prozentzahl`,
              `- Verifiziert: ${new Date().toISOString()}`,
              '',
              'Dieser Deploy schließt LR4 öffentlich und aktiviert ausschließlich LR5 für source-bound, versionierte und sichtbar geprüfte Character-, Set- und Voice-Kandidaten. Er genehmigt keine Dialoge, Timingfassung, Visuals, Stimmen oder Episode.'
            ].join('\n');

            if (runtime.commit !== process.env.DEPLOY_SHA || runtime.closedGate !== 'LR4' || runtime.activeGate !== 'LR5' || runtime.activeTrackingIssue !== 82 || runtime.selectedPilotFireTestPassed !== true || runtime.characterMastersApproved !== 0 || runtime.locationMastersApproved !== 0 || runtime.voiceMastersApproved !== 0) throw new Error('Dashboard runtime does not match the LR4 closure and LR5 handoff.');
            if (studioRuntime.selectedPilotFireTestPassed !== true || studioRuntime.selectedPilotFireTestClosureStatus !== 'closed_verified' || studioRuntime.selectedPilotDetailsStatus !== 'REVIEW_REQUIRED' || studioRuntime.selectedPilotStateHash !== pilotClosure.proof.stateHash || studioRuntime.selectedPilotPackageHash !== pilotClosure.proof.packageHash || studioRuntime.creativeApprovalGranted !== false) throw new Error('Studio runtime does not match the LR4 closure boundary.');

            const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100 });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);
            if (existing) await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            else await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });

            const lr4Issue = issues.find((issue) => issue.number === 76 && !issue.pull_request);
            if (lr4Issue) await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: 76, state: 'closed', state_reason: 'completed' });
