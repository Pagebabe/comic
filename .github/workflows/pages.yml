name: Deploy Comic Factory Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: comic-factory-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build static dashboard artifact
        run: |
          mkdir -p _site/project _site/lib
          cp index.html app.js styles.css _site/
          cp project/project.json _site/project/
          cp lib/context.mjs lib/browser-director.mjs _site/lib/
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy dashboard
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish deployment proof
        uses: actions/github-script@v7
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          DEPLOY_SHA: ${{ github.sha }}
        with:
          script: |
            const title = '[DEPLOY PROOF] Comic Factory Dashboard online';
            const body = [
              '## Verifizierter Online-Stand',
              '',
              `- URL: ${process.env.PAGE_URL}`,
              `- Commit: ${process.env.DEPLOY_SHA}`,
              `- Workflow-Run: ${context.runId}`,
              `- Verifiziert: ${new Date().toISOString()}`,
              '',
              'Dieses Issue wird nur nach einem erfolgreichen GitHub-Pages-Deployment erstellt oder aktualisiert.'
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }
