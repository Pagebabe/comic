name: Deploy Comic Factory Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: comic-factory-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install media, browser and locked Studio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng
          python -m pip install --disable-pip-version-check pillow==11.3.0
          npm install --no-save playwright@1.61.1
          npm --prefix studio-app ci
          npx playwright install chromium

      - name: Verify LR4 closure and active LR5.1 contract
        run: |
          node scripts/check.mjs
          node scripts/check_evidence_chain.mjs
          node scripts/check_studio_foundation.mjs
          node scripts/check_production_loop.mjs
          node scripts/check_selected_pilot_loop.mjs
          node scripts/check_ricco_master_contract.mjs

      - name: Build verified Studio with LR3 LR4 and LR5.1 routes
        run: |
          npm --prefix studio-app run build
          node scripts/check_studio_foundation.mjs --require-dist
          node scripts/check_production_loop.mjs
          node scripts/check_selected_pilot_loop.mjs
          node scripts/check_ricco_master_contract.mjs

      - name: Export selected pilot timing candidate
        run: node scripts/export_ep001_timing.mjs

      - name: Render M1 technical regression proof
        run: python scripts/render_m1.py

      - name: Build static dashboard and Studio artifact
        run: |
          rm -rf _site
          mkdir -p _site/proof/studio _site/studio _site/media/m1 _site/media/ep001
          cp index.html app.js lr1-ui.js audit-ui.js styles.css audit.css m1.css _site/
          cp -R project docs lib assets _site/
          cp -R studio-app/dist/. _site/studio/
          cp output/ep001-readthrough/ep001-timing-draft.srt _site/media/ep001/
          cp output/ep001-readthrough/ep001-timing-report.json _site/media/ep001/
          cp output/m1/ricco-life-sign.mp4 _site/media/m1/
          cp output/m1/ricco-life-sign-poster.png _site/media/m1/
          cp output/m1/render-report.json _site/media/m1/
          touch _site/.nojekyll

      - name: Render dashboard LR3 LR4 and LR5.1 browser proof
        run: |
          python3 -m http.server 4173 --directory _site >/tmp/comic-proof-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          READY=0
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null && curl -fsS http://127.0.0.1:4173/studio/ >/dev/null; then
              READY=1
              break
            fi
            sleep 1
          done
          test "$READY" = 1
          node scripts/build_visual_proof.mjs http://127.0.0.1:4173/
          node studio-app/tests/browser-smoke.mjs http://127.0.0.1:4173/studio/ --output _site/proof/studio
          kill $SERVER_PID 2>/dev/null || true

      - name: Verify exact artifact before deployment
        run: |
          test -f _site/media/m1/ricco-life-sign.mp4
          test -f _site/media/m1/render-report.json
          test -f _site/media/ep001/ep001-timing-draft.srt
          test -f _site/media/ep001/ep001-timing-report.json
          node scripts/check_pages_artifact.mjs --site _site --expect-commit "$GITHUB_SHA"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy dashboard and Studio
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify public LR5.1 Ricco contract zero state
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          rm -rf /tmp/public-proof
          mkdir -p /tmp/public-proof/live

          VERIFIED=0
          for attempt in $(seq 1 30); do
            if curl -fsS "${PAGE_URL}proof/runtime-evidence.json?sha=${GITHUB_SHA}" -o /tmp/public-proof/runtime-evidence.json; then
              if node -e "const r=require('/tmp/public-proof/runtime-evidence.json'); if(r.commit!==process.env.GITHUB_SHA||r.status!=='pass'||r.closedGate!=='LR4'||r.activeGate!=='LR5'||r.activeTrackingIssue!==82||r.activeWorkPackage!=='LR5.1'||r.activeWorkPackageTrackingIssue!==88||r.riccoMasterContractStatus!=='CONTRACT_READY_REVIEW_REQUIRED'||r.riccoMasterCandidateSheets!==0||r.riccoMasterImageGenerationAllowedNow!==false||r.riccoMasterApproved!==false||r.characterMastersApproved!==0||r.locationMastersApproved!==0||r.voiceMastersApproved!==0) process.exit(1);"; then
                VERIFIED=1
                break
              fi
            fi
            sleep 5
          done
          test "$VERIFIED" = 1

          curl -fsS "${PAGE_URL}project/lr3-production-loop-closure.json?sha=${GITHUB_SHA}" -o /tmp/public-proof/lr3-production-loop-closure.json
          curl -fsS "${PAGE_URL}project/lr4-selected-pilot-closure.json?sha=${GITHUB_SHA}" -o /tmp/public-proof/lr4-selected-pilot-closure.json
          curl -fsS "${PAGE_URL}project/lr5-ricco-master-source-inventory.json?sha=${GITHUB_SHA}" -o /tmp/public-proof/lr5-ricco-master-source-inventory.json
          curl -fsS "${PAGE_URL}project/lr5-ricco-master-contract.json?sha=${GITHUB_SHA}" -o /tmp/public-proof/lr5-ricco-master-contract.json
          curl -fsS "${PAGE_URL}proof/studio/studio-runtime-evidence.json?sha=${GITHUB_SHA}" -o /tmp/public-proof/studio-runtime-evidence.json
          curl -fsS "${PAGE_URL}proof/dashboard-desktop.png?sha=${GITHUB_SHA}" -o /tmp/public-proof/dashboard-desktop.png
          curl -fsS "${PAGE_URL}proof/dashboard-mobile.png?sha=${GITHUB_SHA}" -o /tmp/public-proof/dashboard-mobile.png
          curl -fsS "${PAGE_URL}proof/studio/studio-desktop.png?sha=${GITHUB_SHA}" -o /tmp/public-proof/studio-desktop.png
          curl -fsS "${PAGE_URL}proof/studio/studio-mobile.png?sha=${GITHUB_SHA}" -o /tmp/public-proof/studio-mobile.png

          node studio-app/tests/browser-smoke.mjs "${PAGE_URL}studio/" --output /tmp/public-proof/live
          node scripts/check_public_pages_evidence.mjs --dir /tmp/public-proof --expect-commit "$GITHUB_SHA"

      - name: Publish LR5.1 contract proof without granting execution
        uses: actions/github-script@v7
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          DEPLOY_SHA: ${{ github.sha }}
        with:
          script: |
            const fs = require('fs');
            const runtime = JSON.parse(fs.readFileSync('/tmp/public-proof/runtime-evidence.json'));
            const studioRuntime = JSON.parse(fs.readFileSync('/tmp/public-proof/studio-runtime-evidence.json'));
            const pilotClosure = JSON.parse(fs.readFileSync('/tmp/public-proof/lr4-selected-pilot-closure.json'));
            const riccoInventory = JSON.parse(fs.readFileSync('/tmp/public-proof/lr5-ricco-master-source-inventory.json'));
            const riccoContract = JSON.parse(fs.readFileSync('/tmp/public-proof/lr5-ricco-master-contract.json'));
            const title = '[DEPLOY PROOF] Comic Factory Dashboard online';
            const body = [
              '## Verifizierter Recovery-Line-Stand',
              '',
              `- URL: ${process.env.PAGE_URL}`,
              `- Commit: ${process.env.DEPLOY_SHA}`,
              `- Workflow-Run: ${context.runId}`,
              `- LR0 Truth Reset: CLOSED_VERIFIED`,
              `- LR1 Pilotentscheidung: HUMAN_DECISION_RECORDED`,
              `- LR2 Studio Foundation: CLOSED_VERIFIED`,
              `- LR3 neutraler Produktionsloop: CLOSED_VERIFIED`,
              `- LR4 Selected-Pilot-Fire-Test: CLOSED_VERIFIED`,
              `- LR4 Stationen: ${studioRuntime.stationsPassed}/9`,
              `- LR4 Zustand tatsächlich gelöscht: ${studioRuntime.deleteCountercheckPassed ? 'ja' : 'nein'}`,
              `- LR4 Restore-Hash-Match: ${studioRuntime.deleteRestoreHashMatch ? 'ja' : 'nein'}`,
              `- LR4 Zustandshash: ${studioRuntime.selectedPilotStateHash}`,
              `- LR4 Package-Hash: ${studioRuntime.selectedPilotPackageHash}`,
              `- Aktives Gate: LR5 · Issue #82`,
              `- Aktives Arbeitspaket: LR5.1 · Issue #88`,
              `- LR5.1 Status: ${riccoContract.status}`,
              `- Ricco Quellen: ${riccoInventory.sources.length}/7`,
              `- Ricco Konflikte: ${riccoInventory.resolvedConflicts.length}/5`,
              `- Ricco Reviewtests: ${riccoContract.reviewTests.length}/10`,
              `- Ricco Kandidaten: ${riccoContract.currentState.candidateSheets}/${riccoContract.executionGate.maximumCandidateSheetsAfterApproval}`,
              `- Ricco Reviewstatus: ${riccoContract.humanDecision.current}`,
              `- Bildgenerierung jetzt erlaubt: ${riccoContract.executionGate.imageGenerationAllowedNow ? 'ja' : 'nein'}`,
              `- Batch erlaubt: ${riccoContract.executionGate.batchGenerationAllowed ? 'ja' : 'nein'}`,
              `- LoRA-Training erlaubt: ${riccoContract.executionGate.loraTrainingAllowed ? 'ja' : 'nein'}`,
              `- automatische Masterfreigabe erlaubt: ${riccoContract.executionGate.automaticMasterAssignmentAllowed ? 'ja' : 'nein'}`,
              `- Ricco Bildbytes vorhanden: ${riccoContract.currentState.imageBytesPresent ? 'ja' : 'nein'}`,
              `- Ricco externe Ausführung: ${riccoContract.currentState.externalExecutionUsed ? 'ja' : 'nein'}`,
              `- Ricco Master freigegeben: ${riccoContract.currentState.masterApproved ? 'ja' : 'nein'}`,
              `- notwendige Entscheidung vor Generation: ${riccoContract.executionGate.requiredDecisionBeforeGeneration}`,
              `- Character-Master: 0/4`,
              `- Location-Master: 0/4`,
              `- Stimmen: 0/3`,
              `- fertige Episode: nein`,
              `- Studio-Route: ${process.env.PAGE_URL}studio/`,
              `- LR4 Regression-Route: ${process.env.PAGE_URL}studio/#pilot-fire-test`,
              `- LR5.1 Ricco-Route: ${process.env.PAGE_URL}studio/#lr5-ricco`,
              `- Ricco Quelleninventar: ${process.env.PAGE_URL}project/lr5-ricco-master-source-inventory.json`,
              `- Ricco Mastervertrag: ${process.env.PAGE_URL}project/lr5-ricco-master-contract.json`,
              `- Ricco Dokumentation: ${process.env.PAGE_URL}docs/LR5_RICCO_MASTER_CONTRACT.md`,
              `- Dashboard-Runtime-Beweis: ${process.env.PAGE_URL}proof/runtime-evidence.json`,
              `- Studio-Runtime-Beweis: ${process.env.PAGE_URL}proof/studio/studio-runtime-evidence.json`,
              `- Dashboard-Desktop: ${process.env.PAGE_URL}proof/dashboard-desktop.png`,
              `- Dashboard-Mobil: ${process.env.PAGE_URL}proof/dashboard-mobile.png`,
              `- Studio-Desktop: ${process.env.PAGE_URL}proof/studio/studio-desktop.png`,
              `- Studio-Mobil: ${process.env.PAGE_URL}proof/studio/studio-mobile.png`,
              `- Aktuelle Evidence: partiell und quellgebunden; keine Prozentzahl`,
              `- Verifiziert: ${new Date().toISOString()}`,
              '',
              'Dieser Deploy beweist ausschließlich den LR5.1 Quellen-, Vertrags- und sichtbaren Nullzustand. Er erlaubt keine Bild-, GPU-, Provider- oder LoRA-Ausführung und erteilt keine Ricco-Masterfreigabe. Vor einem Kandidaten ist weiterhin CONTRACT_APPROVED_FOR_ONE_CANDIDATE als ausdrückliche menschliche Entscheidung erforderlich.'
            ].join('\n');

            if (runtime.commit !== process.env.DEPLOY_SHA || runtime.activeWorkPackage !== 'LR5.1' || runtime.activeWorkPackageTrackingIssue !== 88 || runtime.riccoMasterContractStatus !== 'CONTRACT_READY_REVIEW_REQUIRED' || runtime.riccoMasterCandidateSheets !== 0 || runtime.riccoMasterImageGenerationAllowedNow !== false || runtime.riccoMasterApproved !== false) {
              throw new Error('Dashboard runtime does not match the LR5.1 zero-state contract.');
            }
            if (studioRuntime.activeWorkPackage !== 'LR5.1' || studioRuntime.activeWorkPackageTrackingIssue !== 88 || studioRuntime.riccoMasterContractStatus !== 'CONTRACT_READY_REVIEW_REQUIRED' || studioRuntime.riccoMasterReviewStatus !== 'REVIEW_REQUIRED' || studioRuntime.riccoMasterCandidateSheets !== 0 || studioRuntime.riccoMasterImageGenerationAllowedNow !== false || studioRuntime.riccoMasterImageBytesPresent !== false || studioRuntime.riccoMasterExternalExecutionUsed !== false || studioRuntime.riccoMasterApproved !== false || studioRuntime.creativeApprovalGranted !== false) {
              throw new Error('Studio runtime does not match the LR5.1 execution boundary.');
            }
            if (pilotClosure.status !== 'closed_verified' || pilotClosure.proof.stateHash !== studioRuntime.selectedPilotStateHash || pilotClosure.proof.packageHash !== studioRuntime.selectedPilotPackageHash) {
              throw new Error('LR4 regression proof drifted during LR5.1 deploy.');
            }

            const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100 });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);
            if (existing) await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            else await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });
