name: Verify and Report Comic Factory Pages

on:
  workflow_run:
    workflows: ["Deploy Comic Factory Dashboard"]
    types: [completed]

permissions:
  contents: read
  issues: write

env:
  EXPECTED_PAGE_URL: https://pagebabe.github.io/comic/

jobs:
  verify_public:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      EXPECTED_COMMIT: ${{ github.event.workflow_run.head_sha }}
      SOURCE_RUN_URL: ${{ github.event.workflow_run.html_url }}
      PAGE_URL: https://pagebabe.github.io/comic/
    steps:
      - name: Checkout exact deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install locked public-proof browser dependencies
        run: |
          npm install --no-save playwright@1.61.1
          npm --prefix studio-app ci
          npx playwright install chromium

      - name: Wait for eight commit-consistent public contracts
        run: |
          rm -rf /tmp/public-proof
          mkdir -p /tmp/public-proof/live /tmp/public-proof/live-root /tmp/public-proof/live-academy /tmp/public-proof/live-readiness /tmp/public-proof/live-cockpit
          node scripts/wait_public_proof_barrier.mjs \
            --base-url "$PAGE_URL" \
            --expect-commit "$EXPECTED_COMMIT" \
            --output /tmp/public-proof \
            --attempts 30 \
            --delay-ms 5000

      - name: Download complete public proof snapshot
        shell: bash
        run: |
          set -u

          download_snapshot() {
            while IFS='|' read -r remote local; do
              [ -n "$remote" ] || continue
              curl --retry 4 --retry-delay 2 --retry-all-errors -fsS \
                -H 'cache-control: no-cache' -H 'pragma: no-cache' \
                "${PAGE_URL}${remote}?sha=${EXPECTED_COMMIT}" \
                -o "/tmp/public-proof/${local}" || return 1
            done <<'FILES'
          project/root-entry-v1.json|root-entry-v1.json
          project/lr3-production-loop-closure.json|lr3-production-loop-closure.json
          project/lr4-selected-pilot-closure.json|lr4-selected-pilot-closure.json
          project/lr5-ricco-master-source-inventory.json|lr5-ricco-master-source-inventory.json
          project/lr5-ricco-master-contract.json|lr5-ricco-master-contract.json
          project/production-academy.json|production-academy.json
          project/novice-acceptance-template.json|novice-acceptance-template.json
          proof/root-entry/root-entry-runtime-evidence.json|root-entry-runtime-evidence.json
          proof/root-entry/root-entry-desktop.png|root-entry-desktop.png
          proof/root-entry/root-entry-mobile.png|root-entry-mobile.png
          proof/studio/academy-desktop.png|academy-desktop.png
          proof/studio/academy-mobile.png|academy-mobile.png
          proof/readiness/academy-readiness-desktop.png|readiness-desktop.png
          proof/readiness/academy-readiness-mobile.png|readiness-mobile.png
          proof/cockpit/production-cockpit-desktop.png|cockpit-desktop.png
          proof/cockpit/production-cockpit-mobile.png|cockpit-mobile.png
          proof/dashboard-desktop.png|dashboard-desktop.png
          proof/dashboard-mobile.png|dashboard-mobile.png
          proof/studio/studio-desktop.png|studio-desktop.png
          proof/studio/studio-mobile.png|studio-mobile.png
          FILES
            return 0
          }

          VERIFIED=0
          for attempt in $(seq 1 10); do
            if download_snapshot; then
              VERIFIED=1
              break
            fi
            sleep 3
          done
          test "$VERIFIED" = 1

      - name: Execute public root, Studio, cockpit, Academy and readiness proofs
        run: |
          GITHUB_SHA="$EXPECTED_COMMIT" node scripts/build_root_entry_proof.mjs "$PAGE_URL" --output /tmp/public-proof/live-root
          GITHUB_SHA="$EXPECTED_COMMIT" node studio-app/tests/browser-smoke.mjs "${PAGE_URL}studio/" --output /tmp/public-proof/live
          GITHUB_SHA="$EXPECTED_COMMIT" node studio-app/tests/production-cockpit-smoke.mjs "${PAGE_URL}studio/" --output /tmp/public-proof/live-cockpit
          GITHUB_SHA="$EXPECTED_COMMIT" node studio-app/tests/academy-smoke.mjs "${PAGE_URL}studio/" --output /tmp/public-proof/live-academy
          GITHUB_SHA="$EXPECTED_COMMIT" node studio-app/tests/academy-readiness-smoke.mjs "${PAGE_URL}studio/" --output /tmp/public-proof/live-readiness

      - name: Verify public root, recovery, cockpit, Academy and readiness contracts
        run: |
          node scripts/check_root_entry_public_evidence.mjs --dir /tmp/public-proof --expect-commit "$EXPECTED_COMMIT"
          node scripts/check_public_pages_evidence.mjs --dir /tmp/public-proof --expect-commit "$EXPECTED_COMMIT"
          node scripts/check_cockpit_public_evidence.mjs --dir /tmp/public-proof --expect-commit "$EXPECTED_COMMIT"
          node scripts/check_public_academy_evidence.mjs --dir /tmp/public-proof --expect-commit "$EXPECTED_COMMIT"
          node scripts/check_readiness_public_evidence.mjs --dir /tmp/public-proof --expect-commit "$EXPECTED_COMMIT"

      - name: Upload public proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comic-public-proof-${{ github.event.workflow_run.head_sha }}
          path: /tmp/public-proof
          if-no-files-found: warn
          retention-days: 14

      - name: Publish rich public proof and preserve honest boundaries
        uses: actions/github-script@v7
        env:
          EXPECTED_COMMIT: ${{ env.EXPECTED_COMMIT }}
          PAGE_URL: ${{ env.PAGE_URL }}
          SOURCE_RUN_URL: ${{ env.SOURCE_RUN_URL }}
          PROOF_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const fs=require('fs');
            const runtime=JSON.parse(fs.readFileSync('/tmp/public-proof/runtime-evidence.json'));
            const root=JSON.parse(fs.readFileSync('/tmp/public-proof/live-root/root-entry-runtime-evidence.json'));
            const rootContract=JSON.parse(fs.readFileSync('/tmp/public-proof/root-entry-v1.json'));
            const academy=JSON.parse(fs.readFileSync('/tmp/public-proof/academy-runtime-evidence.json'));
            const readiness=JSON.parse(fs.readFileSync('/tmp/public-proof/readiness-runtime-evidence.json'));
            const cockpit=JSON.parse(fs.readFileSync('/tmp/public-proof/cockpit-runtime-evidence.json'));
            const cockpitContract=JSON.parse(fs.readFileSync('/tmp/public-proof/production-cockpit-v1.json'));
            const status=JSON.parse(fs.readFileSync('/tmp/public-proof/production-academy-status.json'));
            const ricco=JSON.parse(fs.readFileSync('/tmp/public-proof/lr5-ricco-master-contract.json'));
            if(runtime.commit!==process.env.EXPECTED_COMMIT||root.commit!==process.env.EXPECTED_COMMIT||academy.commit!==process.env.EXPECTED_COMMIT||readiness.commit!==process.env.EXPECTED_COMMIT||cockpit.commit!==process.env.EXPECTED_COMMIT)throw new Error('Public proof commit drifted.');
            if(root.status!=='pass'||root.primaryAction!=='./studio/#cockpit'||root.auditRoute!=='./audit.html'||root.activeReviewIssue!==153||root.localExecutionIssue!==155||root.externalRequests!==0||root.scriptCount!==0||root.buttonCount!==0)throw new Error('Root entry runtime contract drifted.');
            if(rootContract.status!=='ROOT_ENTRY_READY_FOR_PROOF'||rootContract.currentState?.activeReviewIssue!==153||rootContract.currentState?.localExecutionIssue!==155||rootContract.currentState?.activeWorkspace!=='review'||rootContract.primaryAction?.href!=='./studio/#cockpit'||Object.values(rootContract.boundaries||{}).some(Boolean))throw new Error('Root entry source contract drifted.');
            if(status.readiness.productionReady||status.readiness.beginnerReady||status.readiness.observedNoviceRunPassed||status.readiness.completeReviewedEpisodeExists)throw new Error('Readiness overclaim detected.');
            if(ricco.currentState.candidateSheets!==0||ricco.executionGate.imageGenerationAllowedNow!==false||ricco.currentState.masterApproved!==false)throw new Error('Ricco execution boundary drifted.');
            if(cockpit.schemaVersion!==2||cockpit.status!=='pass'||cockpit.activeParentTrackingIssue!==82||cockpit.strategicContractTrackingIssue!==88||cockpit.completedAssetScan!==123||cockpit.activeReviewGate!==153||cockpit.localExecutionTask!==155||cockpit.toolingPullRequest!==154||cockpit.activeWorkspace!=='review'||cockpit.nextDecision!=='LOCAL_REVIEW_PACKAGE_COMPLETE_AND_HUMAN_DECISION_RECORDED'||cockpit.riccoCandidates!==0||cockpit.executableButtons!==0||cockpit.externalRequests!==0)throw new Error('Cockpit runtime contract drifted.');
            if(cockpitContract.status!=='WORKING_COCKPIT_V1'||cockpitContract.activeGate?.trackingIssue!==153||cockpitContract.currentTask?.primaryHref!=='https://github.com/Pagebabe/comic/issues/155'||cockpitContract.nextAllowedStep?.decision!=='LOCAL_REVIEW_PACKAGE_COMPLETE_AND_HUMAN_DECISION_RECORDED'||cockpitContract.sections.length!==6)throw new Error('Cockpit contract drifted.');
            if(Object.values(cockpitContract.boundaries).some(Boolean))throw new Error('Cockpit execution boundary opened.');

            const onlineTitle='[DEPLOY PROOF] Comic Factory Dashboard online';
            const blockerTitle='[DEPLOY BLOCKER] Comic Factory Dashboard not online';
            const body=[
              '## Verifizierter Root-, Recovery-, Cockpit-, Academy- und Readiness-Stand','',
              `- URL: ${process.env.PAGE_URL}`,
              `- Commit: ${process.env.EXPECTED_COMMIT}`,
              `- Deploy-Workflow: ${process.env.SOURCE_RUN_URL}`,
              `- Public-Proof-Workflow: ${process.env.PROOF_RUN_URL}`,
              '- Öffentlicher Root-Einstieg: PASS',
              `- Root-Primäraktion: ${root.primaryAction}`,
              `- Root-Auditroute: ${root.auditRoute}`,
              `- Root externe Requests: ${root.externalRequests}`,
              '- LR0 bis LR4: CLOSED_VERIFIED',
              '- Parent-Gate: LR5 · Issue #82',
              '- Strategischer Ricco-Vertrag: LR5.1 · Issue #88',
              '- Abgeschlossener Assetscan: Issue #123',
              '- Aktives Review-Gate: Issue #153',
              '- Lokaler M1-Auftrag: Issue #155',
              '- Review-Tooling: PR #154',
              `- Ricco Kandidaten: ${ricco.currentState.candidateSheets}/1`,
              `- Bildgenerierung erlaubt: ${ricco.executionGate.imageGenerationAllowedNow?'ja':'nein'}`,
              `- Produktions-Cockpit: ${cockpit.status}`,
              `- Cockpit-Arbeitsbereiche: ${cockpit.workspaceCount}/6`,
              `- Aktiver Cockpit-Bereich: ${cockpit.activeWorkspace}`,
              `- Cockpit-Ausführungsbuttons: ${cockpit.executableButtons}`,
              `- Cockpit externe Requests: ${cockpit.externalRequests}`,
              `- Cockpit-Route: ${process.env.PAGE_URL}studio/#cockpit`,
              `- Nächste erlaubte Entscheidung: ${cockpit.nextDecision}`,
              `- Academy-Status: ${status.status}`,
              `- Academy-Stufen: ${academy.stageCount}/12`,
              `- Readiness: ${readiness.readinessScore}`,
              `- Readiness-Gates: ${readiness.readinessGates}/10`,
              `- Nullwissen-Aufgaben: ${readiness.noviceTasks}/12`,
              `- Production Ready: ${readiness.productionReady?'ja':'nein'}`,
              `- Beginner Ready: ${readiness.beginnerReady?'ja':'nein'}`,
              `- beobachteter Anfänger-Lauf: ${readiness.observedNoviceRunPassed?'bestanden':'offen'}`,
              `- vollständige geprüfte Episode: ${readiness.completeReviewedEpisodeExists?'ja':'nein'}`,
              `- kreative Freigabe: ${readiness.creativeApprovalGranted?'ja':'nein'}`,
              `- Growth OS integriert: ${readiness.growthOsIntegrated?'ja':'nein'}`,
              '- Character-Master: 0/4',
              '- Location-Master: 0/4',
              '- Stimmen: 0/3',
              '- fertige Episode: nein',
              `- Academy-Route: ${process.env.PAGE_URL}studio/#academy`,
              `- Readiness-Matrix: ${process.env.PAGE_URL}project/production-readiness-v1.json`,
              `- Abnahmeprotokoll: ${process.env.PAGE_URL}docs/NOVICE_ACCEPTANCE_PROTOCOL.md`,
              `- Verifiziert: ${new Date().toISOString()}`,'',
              'Der Deploy und der separat wiederholbare Public-Proof beweisen den Root-Einstieg, die aktuelle Werkbanklinie, das tägliche Produktions-Cockpit, technische Bedienbarkeit und öffentliche Gegenprüfung. Sie erteilen keine kreative Freigabe und behaupten weder Beginner Ready noch Production Ready.'
            ].join('\n');

            const {data:issues}=await github.rest.issues.listForRepo({owner:context.repo.owner,repo:context.repo.repo,state:'all',per_page:100});
            const online=issues.find(i=>i.title===onlineTitle&&!i.pull_request);
            const blocker=issues.find(i=>i.title===blockerTitle&&!i.pull_request);
            if(online)await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:online.number,body});
            else await github.rest.issues.create({owner:context.repo.owner,repo:context.repo.repo,title:onlineTitle,body});
            if(blocker)await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:blocker.number,state:'closed',state_reason:'completed'});

            const opsMarker='<!-- ops1-public-proof -->';
            const opsComment=`${opsMarker}\n## Öffentlicher OPS1-Beweis\n\n${body}\n\nIssue #95 bleibt bis zum beobachteten Nullwissen-Lauf und zur vollständigen geprüften Episode offen.`;
            const {data:opsComments}=await github.rest.issues.listComments({owner:context.repo.owner,repo:context.repo.repo,issue_number:95,per_page:100});
            const existingOps=opsComments.find(comment=>comment.body?.includes(opsMarker));
            if(existingOps)await github.rest.issues.updateComment({owner:context.repo.owner,repo:context.repo.repo,comment_id:existingOps.id,body:opsComment});
            else await github.rest.issues.createComment({owner:context.repo.owner,repo:context.repo.repo,issue_number:95,body:opsComment});

            const rootMarker='<!-- ui1-root-public-proof -->';
            const rootComment=`${rootMarker}\n## Öffentlicher UI1-/Root-Beweis\n\n${body}\n\nDer tägliche Primärweg führt jetzt über den bewiesenen Root-Einstieg zum Produktions-Cockpit. Die kreative Assetprüfung bleibt in #153/#155 offen.`;
            for(const issueNumber of [117,121]){
              const {data:comments}=await github.rest.issues.listComments({owner:context.repo.owner,repo:context.repo.repo,issue_number:issueNumber,per_page:100});
              const existing=comments.find(comment=>comment.body?.includes(rootMarker));
              if(existing)await github.rest.issues.updateComment({owner:context.repo.owner,repo:context.repo.repo,comment_id:existing.id,body:rootComment});
              else await github.rest.issues.createComment({owner:context.repo.owner,repo:context.repo.repo,issue_number:issueNumber,body:rootComment});
              await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:issueNumber,state:'closed',state_reason:'completed'});
            }

            const activeLineMarker='<!-- active-line-public-proof -->';
            const activeLineComment=`${activeLineMarker}\n## Öffentlicher Active-Line-Beweis\n\n${body}\n\nIssue #160 ist öffentlich bewiesen und bleibt geschlossen. Die echte Asset-Sichtprüfung bleibt in #153/#155 offen.`;
            const {data:activeLineComments}=await github.rest.issues.listComments({owner:context.repo.owner,repo:context.repo.repo,issue_number:160,per_page:100});
            const existingActiveLine=activeLineComments.find(comment=>comment.body?.includes(activeLineMarker));
            if(existingActiveLine)await github.rest.issues.updateComment({owner:context.repo.owner,repo:context.repo.repo,comment_id:existingActiveLine.id,body:activeLineComment});
            else await github.rest.issues.createComment({owner:context.repo.owner,repo:context.repo.repo,issue_number:160,body:activeLineComment});
            await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:160,state:'closed',state_reason:'completed'});

  report_failure:
    needs: [verify_public]
    if: ${{ always() && (github.event.workflow_run.conclusion != 'success' || needs.verify_public.result != 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Report deployment or public-proof blocker without overwriting last good proof
        uses: actions/github-script@v7
        env:
          DEPLOY_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          VERIFY_RESULT: ${{ needs.verify_public.result }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          SOURCE_RUN_URL: ${{ github.event.workflow_run.html_url }}
          PROOF_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const blockerTitle='[DEPLOY BLOCKER] Comic Factory Dashboard not online';
            const deployFailed=process.env.DEPLOY_CONCLUSION!=='success';
            const reason=deployFailed?'Pages deployment failed':'Public root, recovery, cockpit, Academy or readiness proof failed';
            const body=[
              '## Deployment- oder Public-Proof-Blocker','',
              `- Ergebnis: ${reason}`,
              `- Commit: ${process.env.HEAD_SHA}`,
              `- Deploy-Workflow: ${process.env.SOURCE_RUN_URL}`,
              `- Deploy-Status: ${process.env.DEPLOY_CONCLUSION}`,
              `- Public-Proof-Workflow: ${process.env.PROOF_RUN_URL}`,
              `- Public-Proof-Status: ${process.env.VERIFY_RESULT}`,'',
              'Der letzte ausführlich bewiesene Online-Stand bleibt unverändert dokumentiert. Für diesen Commit wird kein neuer öffentlicher Erfolgsstatus behauptet. Production Ready, Beginner Ready und kreative Freigaben bleiben false.'
            ].join('\n');
            const {data:issues}=await github.rest.issues.listForRepo({owner:context.repo.owner,repo:context.repo.repo,state:'all',per_page:100});
            const blocker=issues.find(i=>i.title===blockerTitle&&!i.pull_request);
            if(blocker)await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:blocker.number,body,state:'open',state_reason:'reopened'});
            else await github.rest.issues.create({owner:context.repo.owner,repo:context.repo.repo,title:blockerTitle,body});
