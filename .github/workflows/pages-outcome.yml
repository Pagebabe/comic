name: Report Comic Factory Pages Outcome

on:
  workflow_run:
    workflows: ["Deploy Comic Factory Dashboard"]
    types: [completed]

permissions:
  contents: read
  issues: write

env:
  EXPECTED_PAGE_URL: https://pagebabe.github.io/comic/

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Preserve rich recovery, Academy and readiness proof
        uses: actions/github-script@v7
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          EXPECTED_PAGE_URL: ${{ env.EXPECTED_PAGE_URL }}
        with:
          script: |
            const success=process.env.CONCLUSION==='success';
            const onlineTitle='[DEPLOY PROOF] Comic Factory Dashboard online';
            const blockerTitle='[DEPLOY BLOCKER] Comic Factory Dashboard not online';
            const {data:issues}=await github.rest.issues.listForRepo({owner:context.repo.owner,repo:context.repo.repo,state:'open',per_page:100});
            const online=issues.find(i=>i.title===onlineTitle&&!i.pull_request);
            const blocker=issues.find(i=>i.title===blockerTitle&&!i.pull_request);
            const rich=success
              && online?.body?.includes(`Commit: ${process.env.HEAD_SHA}`)
              && online?.body?.includes('LR0 bis LR4: CLOSED_VERIFIED')
              && online?.body?.includes('Aktives Gate: LR5 · Issue #82')
              && online?.body?.includes('Aktives Arbeitspaket: LR5.1 · Issue #88')
              && online?.body?.includes('Ricco Kandidaten: 0/1')
              && online?.body?.includes('Bildgenerierung erlaubt: nein')
              && online?.body?.includes('Academy-Stufen: 12/12')
              && online?.body?.includes('Readiness: 2/10 CLOSED_VERIFIED · 7 PARTIAL · 1 OPEN')
              && online?.body?.includes('Readiness-Gates: 10/10')
              && online?.body?.includes('Nullwissen-Aufgaben: 12/12')
              && online?.body?.includes('Production Ready: nein')
              && online?.body?.includes('Beginner Ready: nein')
              && online?.body?.includes('beobachteter Anfänger-Lauf: offen')
              && online?.body?.includes('kreative Freigabe: nein')
              && online?.body?.includes('Growth OS integriert: nein')
              && online?.body?.includes('Character-Master: 0/4')
              && online?.body?.includes('Location-Master: 0/4')
              && online?.body?.includes('Stimmen: 0/3');

            if(success){
              if(!online){
                await github.rest.issues.create({owner:context.repo.owner,repo:context.repo.repo,title:onlineTitle,body:`## Deployment erfolgreich, Detailbeweis ausstehend\n\n- Commit: ${process.env.HEAD_SHA}\n- Workflow: ${process.env.RUN_URL}\n\nDer Pages-Lauf war grün, aber der ausführliche Academy- und Readiness-Beweis wurde noch nicht gefunden. Production Ready und Beginner Ready werden nicht behauptet.`});
              }else if(!rich){
                await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:online.number,body:`## Deployment erfolgreich, Rich-Proof unvollständig\n\n- Commit: ${process.env.HEAD_SHA}\n- Workflow: ${process.env.RUN_URL}\n\nDer ausführliche Recovery-, Academy- und Readiness-Beweis war für diesen Commit nicht vollständig. Production Ready, Beginner Ready und kreative Freigaben bleiben falsch.`});
              }
              if(blocker)await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:blocker.number,state:'closed',state_reason:'completed'});
            }else{
              const body=`## Deployment-Blocker\n\n- Ergebnis: ${process.env.CONCLUSION}\n- Commit: ${process.env.HEAD_SHA}\n- Workflow: ${process.env.RUN_URL}\n\nDer Recovery-, Academy- und Readiness-Deploy ist fehlgeschlagen. Kein aktueller öffentlicher Erfolgsstatus wird behauptet.`;
              if(blocker)await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:blocker.number,body});
              else await github.rest.issues.create({owner:context.repo.owner,repo:context.repo.repo,title:blockerTitle,body});
            }
