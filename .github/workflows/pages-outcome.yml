name: Report Comic Factory Pages Outcome

on:
  workflow_run:
    workflows: ["Deploy Comic Factory Dashboard"]
    types: [completed]

permissions:
  contents: read
  issues: write

env:
  EXPECTED_PAGE_URL: https://pagebabe.github.io/comic/

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Publish outcome without overwriting the LR3 closure proof
        uses: actions/github-script@v7
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          EXPECTED_PAGE_URL: ${{ env.EXPECTED_PAGE_URL }}
        with:
          script: |
            const success = process.env.CONCLUSION === 'success';
            const onlineTitle = '[DEPLOY PROOF] Comic Factory Dashboard online';
            const blockerTitle = '[DEPLOY BLOCKER] Comic Factory Dashboard not online';
            const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100 });
            const online = issues.find((issue) => issue.title === onlineTitle && !issue.pull_request);
            const blocker = issues.find((issue) => issue.title === blockerTitle && !issue.pull_request);
            const richProofAlreadyCurrent = success
              && online?.body?.includes(`Commit: ${process.env.HEAD_SHA}`)
              && online?.body?.includes('Studio-Runtime-Beweis:')
              && online?.body?.includes('LR0 Truth Reset: CLOSED_VERIFIED')
              && online?.body?.includes('LR1 Pilotentscheidung: HUMAN_DECISION_RECORDED')
              && online?.body?.includes('LR2 Studio Foundation: CLOSED_VERIFIED')
              && online?.body?.includes('LR3 neutraler Produktionsloop: CLOSED_VERIFIED')
              && online?.body?.includes('Produktionsloop in Truth State: gerettet')
              && online?.body?.includes('Aktives Gate: LR4 · Issue #76')
              && online?.body?.includes('Selected-Pilot-Fire-Test: OFFEN')
              && online?.body?.includes('kreative Freigabe: nein')
              && online?.body?.includes('keine Prozentzahl');

            if (success) {
              if (!online) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: onlineTitle,
                  body: [
                    '## Verifizierter Recovery-Line-Stand',
                    '',
                    `- Ergebnis: ${process.env.CONCLUSION}`,
                    `- Erwartete URL: ${process.env.EXPECTED_PAGE_URL}`,
                    `- Commit: ${process.env.HEAD_SHA}`,
                    `- Workflow: ${process.env.RUN_URL}`,
                    `- Geprüft: ${new Date().toISOString()}`,
                    '',
                    'Fallback-Beweis. Der Pages-Workflow ergänzt den ausführlichen commitgebundenen LR3-Abschluss- und LR4-Handoff-Beweis.'
                  ].join('\n')
                });
              } else if (!richProofAlreadyCurrent) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: online.number,
                  body: [
                    '## Verifizierter Recovery-Line-Stand',
                    '',
                    `- Ergebnis: ${process.env.CONCLUSION}`,
                    `- Erwartete URL: ${process.env.EXPECTED_PAGE_URL}`,
                    `- Commit: ${process.env.HEAD_SHA}`,
                    `- Workflow: ${process.env.RUN_URL}`,
                    `- Geprüft: ${new Date().toISOString()}`,
                    '',
                    'Fallback-Beweis. Ein aktueller ausführlicher LR3-Abschluss- und LR4-Handoff-Proof war für diesen Commit noch nicht vorhanden.'
                  ].join('\n')
                });
              }
              if (blocker) await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: blocker.number, state: 'closed', state_reason: 'completed' });
            } else {
              const body = [
                '## Deployment-Blocker',
                '',
                `- Ergebnis: ${process.env.CONCLUSION}`,
                `- Erwartete URL: ${process.env.EXPECTED_PAGE_URL}`,
                `- Commit: ${process.env.HEAD_SHA}`,
                `- Workflow: ${process.env.RUN_URL}`,
                `- Geprüft: ${new Date().toISOString()}`,
                '',
                'Der Recovery-Line-Deploy ist fehlgeschlagen. Es wird kein aktueller LR3-Abschluss-, LR4-Handoff- oder Online-Erfolgsstatus behauptet.'
              ].join('\n');
              if (blocker) await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: blocker.number, body });
              else await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title: blockerTitle, body });
            }
