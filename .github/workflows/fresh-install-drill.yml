name: Fresh Install Drill

on:
  pull_request:
    paths:
      - '.github/workflows/fresh-install-drill.yml'
      - 'docs/FRESH_INSTALL_DRILL.md'
      - 'package.json'
      - 'project/fresh-install-contract.json'
      - 'project/production-readiness-v1.json'
      - 'scripts/check_fresh_install_contract.mjs'
      - 'scripts/check_fresh_install_report.mjs'
      - 'scripts/fresh_install_drill.mjs'
      - 'scripts/serve_static.mjs'
      - 'studio-app/**'
      - 'tests/fresh-install-contract.test.mjs'
  push:
    branches: [main]
    paths:
      - '.github/workflows/fresh-install-drill.yml'
      - 'docs/FRESH_INSTALL_DRILL.md'
      - 'package.json'
      - 'project/fresh-install-contract.json'
      - 'project/production-readiness-v1.json'
      - 'scripts/check_fresh_install_contract.mjs'
      - 'scripts/check_fresh_install_report.mjs'
      - 'scripts/fresh_install_drill.mjs'
      - 'scripts/serve_static.mjs'
      - 'studio-app/**'
      - 'tests/fresh-install-contract.test.mjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fresh_install:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify fresh-install contract and negative tests
        run: |
          node --check scripts/serve_static.mjs
          node --check scripts/fresh_install_drill.mjs
          node --check scripts/check_fresh_install_report.mjs
          node --test tests/fresh-install-contract.test.mjs
          node scripts/check_fresh_install_contract.mjs

      - name: Execute isolated fresh install, build and browser drill
        run: npm run drill:fresh-install

      - name: Verify exact fresh-install report
        run: node scripts/check_fresh_install_report.mjs --expect-commit "$GITHUB_SHA"

      - name: Upload fresh-install proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comic-fresh-install-proof-${{ github.sha }}
          path: output/fresh-install/
          if-no-files-found: warn
          retention-days: 30
